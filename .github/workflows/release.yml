name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify tag and quality gates
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.pkg.outputs.name }}
      package_version: ${{ steps.pkg.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Read package metadata
        id: pkg
        run: |
          printf 'name=%s\n' "$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v${{ steps.pkg.outputs.version }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match package version $EXPECTED"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint, format, and test
        run: npm run check

      - name: Verify package contents
        run: npm run pack:check

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for npmjs
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish package to npmjs
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gh-packages:
    name: Publish to GitHub Packages (scoped packages only)
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(needs.verify.outputs.package_name, '@')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: npm ci

      - name: Publish package to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify
      - publish-npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release tarball
        run: npm pack

      - name: Publish GitHub Release with notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: weasyprint-wrapper-${{ needs.verify.outputs.package_version }}.tgz
