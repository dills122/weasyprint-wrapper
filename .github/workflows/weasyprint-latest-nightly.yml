name: WeasyPrint Latest

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

jobs:
  smoke-latest:
    name: WeasyPrint latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-dejavu-core

      - name: Install latest WeasyPrint CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install weasyprint
          weasyprint --version

      - name: Install dependencies
        run: npm ci

      - name: Run real-world smoke test
        run: npm run test:real
