name: WeasyPrint Smoke

on:
  push:
    branches:
      - master
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: WeasyPrint ${{ matrix.weasyprint-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        weasyprint-version: ["52.5", "53.3", "57.2", "60.2", "61.2", "62.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-dejavu-core

      - name: Install WeasyPrint CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "weasyprint==${{ matrix.weasyprint-version }}" \
            "pydyf==0.10.0"
          weasyprint --version
          which weasyprint

      - name: Install dependencies
        run: npm ci

      - name: Run real-world smoke test
        run: npm run test:real

      - name: Generate smoke PDF artifact
        run: npm run smoke:pdf

      - name: Upload generated PDF
        uses: actions/upload-artifact@v4
        with:
          name: smoke-pdf-weasyprint-${{ matrix.weasyprint-version }}
          path: artifacts/test-smoke.pdf
          if-no-files-found: error
