pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{js,mjs,cjs,json,md,yml,yaml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{js,mjs,cjs}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    test:
      run: npm test
